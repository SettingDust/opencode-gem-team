      retries_used: 0
      requires_design_validation: false
    acceptance_criteria:
      - 确认不会再出现上游无更新却只更新 manifest 的提交。
      - 确认真实上游内容变化仍被同步并提交。
      - 确认未引入模型路由、provider model ID、secret-like 内容或 orchestrator self-routing。
    success_criteria:
      - 审查结论为 approve 或列出必须修复项；必须修复项返回 T1。
      - reviewer_focus 中的风险维度已全部检查。
    requires_review: true
    review_depth: standard
    review_security_sensitive: false
    handoff:
      do_not_reinvestigate:
        - 根因和推荐设计来自 task_definition；审查重点是实现是否满足，不重开方案大改。
      target_files:
        - scripts/sync-agents.mjs
        - test/sync-agents.test.ts
        - agents/generated/manifest.json
      acceptance_checks:
        - git diff --check
        - npm test
        - npm run validate:sync

  - id: T4-commit-trigger-and-pull
    title: 提交修复、触发 sync action 并同步远端结果到本地
    description: 使用 Conventional Commit 提交已验证修复；选择 workflow_ref=提交时的当前分支/ref，推送同一 ref，并在触发前验证远端 workflow_ref 已包含本地修复提交（例如 git rev-parse HEAD 等于 refs/remotes/origin/<workflow_ref> 或 git branch -r --contains HEAD 包含 origin/<workflow_ref>）。随后通过 gh workflow run sync-agents.yml --ref <workflow_ref> 触发一次 GitHub sync action；等待/检查同一 ref 上的 workflow run 结果，若 action 推送生成产物提交，则从同一 ref fast-forward 更新本地并确认最终状态。若仓库 workflow/action 只在 main 上有意义，而当前 ref 不是 main 且没有用户明确批准直接 main push/merge，则停止并报告需要批准的阻塞项。
    wave: 4
    agent: gem-devops
    status: completed
    covers:
      - git-commit
      - workflow-dispatch
      - remote-result-sync
    dependencies:
      - T3-review-sync-fix
    conflicts_with: []
    context_files:
      - path: .github/workflows/sync-agents.yml
        description: workflow_dispatch 入口；会 resolve latest upstream release、运行 sync/validation/test/lint/dist 并按需 commit push。
      - path: package.json
        description: workflow 与本地验证脚本来源。
      - path: AGENTS.md
        description: Conventional Commits 与验证命令约定。
    flags:
      flaky: false
      retries_used: 0
      requires_design_validation: false
    acceptance_criteria:
      - 修复提交已创建，提交信息使用 Conventional Commits。
      - commit、push、workflow_dispatch 与 pull/ff-only 全部使用同一个选定 workflow_ref（默认提交时当前分支/ref），不得提交到非 main 分支却用 --ref main 触发旧代码。
      - 触发 workflow 前已确认远端 workflow_ref 包含修复提交：git rev-parse HEAD 等于远端 ref HEAD，或远端 ref 可证明 contains 该提交。
      - 已触发一次 sync-agents.yml workflow_dispatch --ref <workflow_ref>；若 gh 认证/权限、推送权限或分支策略不足，明确报告阻塞。
      - workflow 产生的同一 ref 远端结果已更新到本地，最终本地工作区状态已报告。
    success_criteria:
      - git status 在提交前只包含本任务相关变更。
      - commit message 建议：fix: skip manifest sync when upstream unchanged。
      - workflow_ref 由 git branch --show-current 或等价方式确定为当前提交所在 ref；git push origin HEAD:<workflow_ref> 或等价命令成功。
      - gh workflow run sync-agents.yml --ref <workflow_ref> 在确认远端 ref 包含修复提交后成功触发，或权限/策略阻塞证据完整。
      - git pull --ff-only origin <workflow_ref> 或等价命令完成后，本地 HEAD 与远端 <workflow_ref> 对齐；若 workflow 无变更提交，也需确认无待拉取结果。
      - 若 workflow/action 仅适用于 main，且当前 workflow_ref 不是 main，则必须在 direct main push/merge 获得用户批准后才能改用 main；否则任务状态为 blocked。
    environment: development
    requires_approval: false
    devops_security_sensitive: false
    handoff:
      do_not_reinvestigate:
        - 不创建 release，不更改 workflow 行为，除非 T1/T3 指出必要。
      target_files:
        - scripts/sync-agents.mjs
        - test/sync-agents.test.ts
        - agents/generated/manifest.json
        - agents/generated/*.agent.md
      acceptance_checks:
        - git status --short
        - git commit -m "fix: skip manifest sync when upstream unchanged"
        - workflow_ref="$(git branch --show-current)"
        - git push origin HEAD:"$workflow_ref"
        - git rev-parse HEAD && git ls-remote origin "refs/heads/$workflow_ref"
        - git branch -r --contains HEAD | grep "origin/$workflow_ref"
        - gh workflow run sync-agents.yml --ref "$workflow_ref"
        - gh run list --workflow sync-agents.yml --limit 1
        - git pull --ff-only origin "$workflow_ref"

reviewer_focus:
  - idempotency
  - stable-field-comparison
  - real-upstream-change-preservation
  - generated-artifact-integrity
  - workflow/gh-permission-handling

prd_update_recommended: false
