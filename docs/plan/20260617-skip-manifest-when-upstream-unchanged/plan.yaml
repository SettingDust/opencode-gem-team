        - npm run lint
        - npm run validate:dist
        - npm run validate:no-model-ids

  - id: T3-review-sync-fix
    title: 审查 sync no-op 修复与测试充分性
    description: 审查 T1/T2 结果，重点确认稳定字段比较正确排除易变字段、真实 upstream 变化不会被吞掉、测试无真实网络依赖、生成产物与 PRD 约束未被破坏。
    wave: 3
    agent: gem-reviewer
    status: completed
    covers:
      - correctness-review
      - regression-risk-review
      - invariant-check
    dependencies:
      - T2-full-local-verification
    conflicts_with: []
    context_files:
      - path: scripts/sync-agents.mjs
        description: 核心修复审查对象。
      - path: test/sync-agents.test.ts
        description: 新增幂等与真实变更测试。
      - path: docs/PRD.md
        description: 同步契约、模型边界、orchestrator 自路由禁止等产品约束。
    flags:
