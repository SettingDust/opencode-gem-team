    conflicts_with: []
    context_files:
      - path: package.json
        description: 验证脚本定义；build 命令故意名为 compile。
      - path: agents/generated/manifest.json
        description: no-op 验证重点 diff 文件。
      - path: .github/workflows/sync-agents.yml
        description: workflow 中也会运行 sync、validate、test、lint、dist validation。
    flags:
