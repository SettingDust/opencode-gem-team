      - sync:agents 对 gem-team-v1.66.0 不产生 manifest-only diff，除非上游确有实际内容变化。
    success_criteria:
      - npm run sync:agents -- --upstream-ref gem-team-v1.66.0 后 git diff -- agents/generated/manifest.json agents/generated/*.agent.md 为空或仅包含真实上游 body 变化。
      - npm run validate:sync、npm test、npm run typecheck、npm run lint、npm run validate:dist、npm run validate:no-model-ids 全部通过。
    environment: development
    requires_approval: false
    devops_security_sensitive: false
    handoff:
      do_not_reinvestigate:
        - 不运行未列出的长流程或发布命令。
      target_files:
        - scripts/sync-agents.mjs
        - test/sync-agents.test.ts
        - agents/generated/manifest.json
        - agents/generated/*.agent.md
      acceptance_checks:
        - npm run sync:agents -- --upstream-ref gem-team-v1.66.0
        - git diff -- agents/generated/manifest.json agents/generated/*.agent.md
