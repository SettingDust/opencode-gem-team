      - Node.js ESM
      - OpenCode plugin SDK @opencode-ai/plugin ^1.15.13
      - node:test
    test_coverage: 补齐 T1 指向的最小回归；优先覆盖 dist/package import smoke 和 generated assets 加载失败模式。
    diag:
