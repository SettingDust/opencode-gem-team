    acceptance_criteria:
      - AC-03: OpenCode 加载后可用全部 16 个真实 slug。
      - AC-04: gem-orchestrator 是入口 agent，但不能作为自身 child/subagent。
      - AC-10: 不覆盖用户已有 OpenCode agent.model，且不补写插件侧模型字段。
      - AC-11/AC-13/AC-22: 不新增插件侧模型路由、role_models 或具体模型 ID。
      - AC-14: 通过 config hook 注入 agents，不使用 chat.params 覆盖实际请求 model。
    success_criteria:
      - 新增或更新的测试能在缺失/陈旧 dist、generated assets resolution、或 package entry smoke 中捕获 T1 发现的根因。
      - npm test、npm run typecheck、npm run validate:dist、npm run validate:no-model-ids 通过。
      - 变更保持最小，不引入 provider/model routing 或 orchestrator self-routing。
      - 原子性预算：总 changed lines <=300；目标文件必须是 T1 diagnosis 明确列出的必要文件，超出预算或新增目标文件需退回 replan。
    evidence:
      summary: >-
        Added runtime-adjacent regression coverage without changing business logic: a node:test smoke now imports
        the compiled dist entrypoint and verifies its config hook injects all 16 canonical gem-* slugs, and
        validate:dist now executes the compiled plugin entry to assert runtime injection plus same-slug preservation.
      key_points:
        - Changed files stayed within the T1-approved scope, plus this required plan status update.
        - No src business logic changed; src/index.ts, src/hooks/config.ts, and src/agents/generated-loader.ts were untouched.
        - Same-slug preservation remains intentional and is now called out more explicitly in regression coverage.
        - Verified with npm test, npm run validate:dist, npm run typecheck, and npm run validate:no-model-ids.
      changed_lines_estimate: 95
    tech_stack:
