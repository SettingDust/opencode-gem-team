implementation_specification:
  - 任务按 debugger → implementer → devops → reviewer 串联；实现前必须有 T1 root_cause。
  - 最小修复优先覆盖运行时加载链路：dist/src entry、package exports、generated assets 路径解析、OpenCode CLI package-path install。
  - 不改变 Gem Team upstream agent 行为，不新增插件侧模型路由，不覆盖已有 OpenCode agent.model。
  - T2 执行预算为 <=300 changed lines；仅允许修改 T1 diagnosis 证明必要的目标文件，超出则需要 replan。
  - T3 必须使用临时 HOME/USERPROFILE、XDG_CONFIG_HOME、XDG_CACHE_HOME、OPENCODE_CONFIG_DIR 或 OpenCode 等价隔离配置路径，禁止读取/修改用户或全局 OpenCode 配置。

contracts:
  - from_task: T1-diagnose-runtime-injection
    to_task: T2-minimal-injection-fix
    interface: debugger_diagnosis
    format: root_cause, reproduction_steps, eliminated_causes, target_files, minimal_fix_recommendations
  - from_task: T2-minimal-injection-fix
    to_task: T3-cli-regression
    interface: verification_build
    format: compiled dist present, changed files summary, commands to run, expected 16 gem-* agent list result
  - from_task: T2-minimal-injection-fix
    to_task: T4-review-fix-and-boundaries
    interface: fix_summary
    format: root_cause_link, changed_files, changed_lines_count, tests_added_or_updated, acceptance_checks, confirmation that changed_lines_count <=300 and files were T1-proven necessary
  - from_task: T3-cli-regression
    to_task: T4-review-fix-and-boundaries
    interface: runtime_evidence
    format: commands, isolated temp HOME/USERPROFILE and config/cache paths used, observed agent count/slugs, limitations, redaction/no-secret assurance, confirmation that user/global OpenCode config was not read or mutated

reviewer_focus:
  - runtime_load_path_vs_direct_hook_tests
  - dist_and_generated_assets_packaging
  - user_agent_model_preservation
  - no_model_routing_or_concrete_model_ids
  - installation_poc_claim_accuracy
  - T2_atomicity_budget_and_T1_file_scope
  - T3_cli_isolation_no_global_config_mutation

prd_update_recommended: false
