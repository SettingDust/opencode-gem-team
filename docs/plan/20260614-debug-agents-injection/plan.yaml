        - src/hooks/config.ts
        - src/agents/generated-loader.ts
        - test/plugin-config.test.ts
        - scripts/validate-dist.mjs
      minimal_change: 只改 T1 证明与注入失效直接相关的代码/测试/验证脚本；总 changed lines <=300；不得修改 T1 未列为必要的文件；不做无关清理。
      acceptance_checks:
        - npm test
        - npm run typecheck
        - npm run validate:dist
        - npm run validate:no-model-ids

  - id: T3-cli-regression
    title: 验证 OpenCode 本地 CLI/package-path 加载与 agent 可见性
    description: 在临时 fixture 中执行可重复本地 OpenCode 插件加载验证，确认 package entry、dist、generated assets 与 config hook 在 CLI agent list 中生效；若环境缺少 opencode CLI，则记录阻塞证据和替代 smoke 验证。
    wave: 3
    agent: gem-devops
    status: completed
    covers:
      - cli-regression
      - package-path-install
      - runtime-evidence
    dependencies:
      - T2-minimal-injection-fix
    conflicts_with: []
    context_files:
      - path: docs/installation-poc.md
        description: 既有 PoC 证据、限制和安全边界。
      - path: package.json
        description: OpenCode package target detection 入口。
      - path: dist/src/index.js
        description: 编译后的实际 package entry。
    flags:
      flaky: false
      retries_used: 0
      requires_design_validation: false
    acceptance_criteria:
      - AC-16: PoC 可证明插件加载成功，或如不能执行则准确记录限制。
      - AC-17: PoC 可证明 16 个 agents 可见。
      - AC-18/AC-19: 用户已有 agent.model 不被覆盖；未配置时不补写模型字段。
      - AC-21: gem-orchestrator 不会路由到自身。
    success_criteria:
      - 在隔离临时目录运行 npm run compile 后执行 opencode plugin <repo-path> --force 与 opencode agent list，统计 16 个 gem-* agents。
      - CLI 隔离必须设置临时 HOME/USERPROFILE、XDG_CONFIG_HOME、XDG_CACHE_HOME、OPENCODE_CONFIG_DIR（或当前 OpenCode 支持的等价 config dir env），并在临时工作目录内创建一次性 config；禁止读取或修改用户/全局 OpenCode 配置。
      - 验证输出需 redaction 后记录，不打印 secrets，不写全局 OpenCode 配置。
      - 将验证命令、结果和限制反馈给 reviewer；必要时更新 docs/installation-poc.md 的证据而不夸大 GitHub remote 状态。
    evidence:
      summary: >-
        In an approved isolated temp environment, OpenCode CLI 1.17.4 successfully installed the
        local path plugin via `opencode plugin E:\Projects\opencode-gem-team --force`, wrote only
        fixture-local `.opencode/opencode.json`, and `opencode agent list` reported all 16 canonical
        `gem-*` agents. Debug logs showed config reads only from the temp XDG paths, the temp
        OPENCODE_CONFIG_DIR, and the fixture-local `.opencode` file. A second isolated fixture with an
        existing same-slug `gem-reviewer` override preserved that override visibly: the agent list
        showed `gem-reviewer (primary)` while all 16 `gem-*` agents remained present.
      key_points:
        - `opencode plugin` output included `Plugin package ready`, `Detected server target`, and `Plugin config updated`.
        - The local install fixture `.opencode/opencode.json` contained only the local plugin path entry.
        - Captured `opencode agent list` output contained 16 `gem-*` lines, with `gem-orchestrator (primary)` and 15 other generated agents.
        - Same-slug preservation remained observable in CLI output: preexisting `gem-reviewer.mode=primary` stayed primary instead of the generated subagent default.
        - GitHub remote install/load remains unverified and must stay documented as pending.
    environment: development
    requires_approval: false
    devops_security_sensitive: false
    handoff:
      do_not_reinvestigate:
        - 不尝试读取全局 OpenCode 配置或秘密。
        - 不把本地 path install 结果包装成 GitHub remote install 成功。
        - 不使用默认 HOME/USERPROFILE、默认 XDG config/cache、或用户现有 OpenCode 配置路径执行 CLI 验证。
      target_files:
        - docs/installation-poc.md
      acceptance_checks:
        - npm run compile
        - npm run validate:dist
        - opencode plugin <repo-path> --force in temp fixture with isolated HOME/USERPROFILE, XDG_CONFIG_HOME, XDG_CACHE_HOME, and OPENCODE_CONFIG_DIR if CLI exists
        - opencode agent list in temp fixture with the same isolated env if CLI exists

