plan_id: 20260614-debug-agents-injection
objective: 检查 agents 注入为什么没有效果，并完成最小修复/验证。
created_at: "2026-06-14T00:00:00+08:00"
created_by: gem-planner
status: in_progress
tldr: |
  中等复杂度调试计划：先由 debugger 在真实 OpenCode 加载链路、dist/asset 路径、用户同 slug agent 覆盖语义之间定位根因；再由 implementer 做最小修复并补齐回归测试；最后由 devops/reviewer 验证本地 CLI 加载、dist/package 形态和 PRD 边界。

plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 5
  risk_score: medium
quality_warnings:
  - GitHub remote install/load 仍是 docs/installation-poc.md 中的 pending 项；本计划先要求可重复本地 CLI/package-path 回归，远程 GitHub 验证若需要凭据或外部环境则记录为限制。
  - T2 原子性预算为 <=300 changed lines，且只能修改 T1 证明必要的文件；若根因需要更大范围变更，必须停止并 replan。

open_questions:
  - question: 真实失败发生在 OpenCode 未加载插件、加载旧 dist、generated assets 缺失，还是同 slug 用户配置保留导致看似未注入？
    context: 直接调用 injectGemTeamAgents 与 plugin.server().config() 的现有单测已覆盖成功路径，但缺少真实 OpenCode CLI/安装缓存链路回归。
    type: research
    affects:
      - T1-diagnose-runtime-injection
      - T2-minimal-injection-fix
  - question: 当前环境是否可执行真实 opencode plugin/agent list 命令？
    context: docs/installation-poc.md 已记录本地 path install 成功，但 GitHub remote install 仍未端到端证明。
    type: nice_to_know
    affects:
      - T3-cli-regression

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: 只修复直接注入函数，遗漏 OpenCode 实际加载的是 dist/src/index.js 或缓存包。
      likelihood: medium
      impact: high
      mitigation: debugger 必须比较 src 与 dist 入口、package exports、generated asset resolution、OpenCode CLI 加载路径。
    - scenario: 将保留 existing 同 slug agent 字段误判为缺陷，破坏“不覆盖用户 agent.model/配置”的 PRD 契约。
      likelihood: medium
      impact: high
      mitigation: implementer 只修复加载/资产/回归覆盖问题，不改变 mergeMissingAgentFields 的用户配置优先语义，除非 debugger 证明违反 PRD。
    - scenario: GitHub remote install 因环境/网络/凭据不可测，导致验证被误写为通过。
      likelihood: medium
      impact: medium
      mitigation: devops 仅声明实际执行过的验证；无法执行则更新证据限制，不发布最终 GitHub 安装成功结论。
  assumptions:
    - 用户报告的“注入没有效果”优先按运行时加载/安装链路问题处理，而非直接注入函数完全失效。
    - 最小修复应保持 OpenCode 原生 agent 配置优先，不新增模型路由、role_models 或 provider-side routing。

tasks:
  - id: T1-diagnose-runtime-injection
    title: 定位 agents 注入运行时失效根因
    description: 对比直接 config hook 成功路径与真实 OpenCode 加载路径，确认失效发生在插件加载、dist 陈旧、generated assets resolution、package exports、OpenCode 缓存安装，还是同 slug existing 配置保留语义。
    wave: 1
    agent: gem-debugger
    status: completed
    evidence:
      summary: >-
        T1 did not reproduce a code-level injection failure. In an isolated OpenCode CLI run,
        local package-path install succeeded and `opencode agent list` showed the built-in
        primary agents plus all 16 injected `gem-*` agents. `npm run validate:dist` passed,
        and `npm pack --dry-run --json` confirmed `agents/generated/*` and `dist/src/*` are
        included in the package payload.
      key_points:
        - Dist entrypoints are present and importable via ./dist/src/index.js.
        - Generated assets resolve from package payload; npm pack includes agents/generated/*.
        - Existing same-slug preservation semantics remain intentional and were not implicated.
        - The user's reported failure is more likely stale local install/config context or a
          different runtime environment than the current workspace state.
    covers:
      - root-cause-analysis
      - runtime-load-path
      - generated-assets
    dependencies: []
    conflicts_with: []
    context_files:
      - path: src/index.ts
        description: PluginModule default export；server config hook 调用 injectGemTeamAgents。
      - path: src/hooks/config.ts
        description: agents 注入与 existing/generated merge 逻辑。
      - path: src/agents/generated-loader.ts
        description: manifest 与 *.agent.md 的运行时路径解析。
      - path: package.json
        description: main/exports 指向 dist/src/index.js，scripts 使用 compile 而非 build。
      - path: test/plugin-config.test.ts
        description: 现有单测直接调用 src hook，未覆盖真实 CLI 安装/缓存链路。
      - path: docs/installation-poc.md
        description: 本地 path install 已验证，GitHub remote install 仍 pending。
    flags:
      flaky: false
      retries_used: 0
      requires_design_validation: false
    acceptance_criteria:
      - AC-03: OpenCode 加载后可用全部 16 个真实 slug。
      - AC-10: 注入默认 agent 信息时不得覆盖用户已有 OpenCode agent.model，且不得补写插件侧模型字段。
      - AC-14: config hook 动态注入 gem-orchestrator 与 15 个非 orchestrator gem-* agents，且不使用 chat.params 设置实际请求 model。
      - AC-16/AC-17: PoC 或本地可重复验证需证明插件加载与 16 agents 可见；若 GitHub remote 不可验证必须明确限制。
    success_criteria:
      - 输出一个明确 root_cause，包含证据路径与复现/反证步骤。
      - 区分代码缺陷、构建产物陈旧、安装/缓存形态、用户配置覆盖语义四类原因。
      - 给出最小修复建议，不要求大规模重构。
    handoff:
      do_not_reinvestigate:
        - 不重复证明 injectGemTeamAgents 直接调用可注入 16 agents；现有 test/plugin-config.test.ts 已覆盖。
        - 不重新设计 Gem Team 编排或 agent 行为。
      target_files:
        - src/index.ts
        - src/hooks/config.ts
        - src/agents/generated-loader.ts
        - package.json
        - test/plugin-config.test.ts
        - docs/installation-poc.md
      acceptance_checks:
        - npm test
        - npm run typecheck
        - npm run validate:dist
        - npm run validate:no-model-ids

  - id: T2-minimal-injection-fix
    title: 实施最小 agents 注入修复与回归覆盖
    description: 基于 T1 diagnosis 修复最小必要代码/测试/构建产物问题；重点覆盖真实 dist/package 加载与 generated assets 存在性，不改变用户已有 agent 配置优先级。
    wave: 2
    agent: gem-implementer
    status: completed
    covers:
