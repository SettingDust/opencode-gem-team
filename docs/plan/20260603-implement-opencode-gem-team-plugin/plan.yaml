  Twelve-wave implementation plan. Wave 1 proves feasibility before implementation; later hooks, docs, dist, and release/commit paths are blocked by the PoC gates. GitHub install, dist, and package-manager conclusions remain Pending/Blocked until PoC evidence verifies them.

