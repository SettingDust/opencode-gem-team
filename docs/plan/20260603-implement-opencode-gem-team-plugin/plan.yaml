mvp_gates:
  - id: MVP-1
    name: agent load
    required_by: [T07]
    acceptance: "Local OpenCode load evidence or typed/mock-compatible evidence shows all 16 agents injected."
  - id: MVP-2
    name: agent.model preservation
    required_by: [T03, T07, T11]
    acceptance: "Existing OpenCode native agent.model is never overwritten; priority remains agent.model > complexity_models[tier] > selected model."
  - id: MVP-3
    name: tier routing
    required_by: [T03, T08]
    acceptance: "Only simple, medium, and complex tiers are supported; no per-agent, role, provider router, or fallback-chain model config."

global_guards:
  sync_network_guard:
    - "GitHub access is read-only."
    - "No token is required."
    - "Do not read, print, or persist environment secrets."
    - "Do not POST, PUT, upload, mutate remote state, or emit telemetry."
  poc_guard:
    - "Default PoC flow must not call real providers."
    - "Use dry-run, mock, local fixture, or local OpenCode load evidence."
    - "Do not record API keys or tokens."
    - "Do not leak concrete provider model IDs or provider model names."
  body_preserve_guard:
    - "Upstream agent body content is preserved verbatim by default."
    - "Any non-metadata/header body diff fails validation unless allowlisted with reason and evidence."
  preserve_orchestration_guard:
    - "Do not convert-delete or semantically rewrite phases, DAG/waves, task schemas, failure handling, memory, or context envelope content."
  docs_guard:
    - "README/examples installation instructions must use Verified/Pending/Blocked status labels."
    - "Before PoC completion, do not publish final unverified install commands."
  dist_guard:
    - "dist is not submitted by default."
    - "Optional dist task runs only if T01 PoC proves dist is necessary."
    - "If dist exists, validate:dist freshness is mandatory."

poc_dependent_items:
  - "@opencode-ai/plugin type shape and PluginModule/legacy function support."
  - "GitHub source syntax for OpenCode plugin install; format observed from redacted global config, end-to-end install/load still Pending."
  - "Whether dist must be committed for GitHub install/load."
  - "Whether a package manager participates in GitHub install/load."
  - "Whether OpenCode model mutation hooks can prove AC-20 beyond experimental/limited behavior."

