patterns_found:
  - category: structure
    pattern: session-first notifier uses best-effort prompt transport only
    description: 代码将通知视为最佳努力副作用；transport 不可用或调用失败时直接静默，不降级为 chat.message。
    examples:
      - file: src/hooks/model-routing.ts
        location: "109-123"
        snippet: "if (prompt === undefined) return ... try { await prompt(request) } catch { /* Silent skip */ }"
    prevalence: common
  - category: architecture
    pattern: direct-shape first with path/body compatibility fallback
    description: 说明作者已预期宿主或 SDK 面对不同 prompt 请求形状兼容性可能不一致。
    examples:
      - file: src/hooks/model-routing.ts
        location: "130-150"
        snippet: "try direct request; catch -> session.promptAsync({ path:{id}, body:{...} })"
      - file: test/model-routing-hook.test.ts
        location: "247-286"
        snippet: "first call rejects, second call uses { path, body }"
    prevalence: common
  - category: architecture
    pattern: ignored text part is treated as transport intent, not visibility proof
    description: 计划文档已把 ignored:true 定性为“不是 true non-context toast”，因此该标记仅表达意图，非宿主显示契约。
    examples:
      - file: docs/plan/20260603-implement-opencode-gem-team-plugin/plan.yaml
        location: "678-684"
        snippet: "session.prompt with ignored: true is not a true non-context toast equivalent... Real host-session visibility is still unverified"
    prevalence: common
  - category: documentation
    pattern: README claim is stronger than underlying verified evidence
    description: README 写成 session-visible notification，但本仓库可核验证据只覆盖 API 调用和 mock shape，不覆盖真实 UI 渲染。
    examples:
      - file: README.md
        location: "22"
        snippet: "shows a short session-visible notification"
    prevalence: occasional
