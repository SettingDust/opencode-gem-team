conclusion:
  user_visible_credibility: low_to_medium
  proven:
    - "插件代码会构造并调用 client.session.promptAsync/client.session.prompt。"
    - "请求固定包含 noReply: true 与 parts:[{type:'text', ignored:true}]。"
    - "当 direct-shape 调用失败时，会尝试 path/body shape 回退。"
    - "mock/typed tests 证明了 API 调用形状、metadata 透传条件、去重与静默失败策略。"
  not_proven:
    - "真实 OpenCode 宿主一定会把该 prompt 渲染为用户可见消息。"
    - "ignored:true 在真实宿主中等价于 toast、banner、status 或任何稳定的非上下文通知。"
    - "不同宿主（TUI/桌面/ACP client）对 direct-shape 与 path/body-shape 的显示行为一致。"
  strongest_public_evidence:
    - source: "OpenCode issue #6513"
      boundary: "证明某些真实 TUI 场景中 session.prompt body noReply 消息会作为 user message 出现；但该例没有 ignored:true，而且 noReply 还会触发 assistant reply，因此不能证明本仓库的 ignored noReply 通知是稳定、静默、可见的。"
    - source: "OpenCode issue #4431"
      boundary: "证明 noReply 语义曾在版本回归中挂起，说明该 transport 行为并不稳定，不能把可见性当作强契约。"
    - source: "OpenCode test/server/httpapi-sdk.test.ts code search result"
      boundary: "证明 SDK 同时存在 sdk.session.prompt 与 sdk.tui.showToast surfaces，且 showToast 是单独 API；这反而削弱了把 ignored session prompt 视作 toast 等价物的说法。"
    - source: "ACP/agent code and public ACP materials"
      boundary: "证明存在 session prompt 协议层与 session/update 事件流，不证明最终 UI 必然展示 ignored prompt。"
  minimum_runtime_observation_needed:
    - "在真实 OpenCode 目标版本中安装最小 PoC 插件，只执行一次 client.session.prompt(... noReply:true, parts:[{type:'text', text:'sentinel', ignored:true}])。"
    - "记录三项观测：1) UI 是否出现 sentinel；2) 是否写入 session history/messages API；3) 是否触发 assistant reply / queued / hang。"
    - "若需更强证据，再做 A/B：ignored:true vs ignored:false、direct-shape vs path/body shape、TUI vs ACP/desktop client。"
