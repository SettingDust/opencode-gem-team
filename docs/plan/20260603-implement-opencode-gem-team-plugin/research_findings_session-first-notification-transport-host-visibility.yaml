plan_id: 20260603-implement-opencode-gem-team-plugin
objective: "补足 session-first 通知 transport 的宿主可见性证据边界，判断 client.session.prompt(... noReply: true, parts:[{type:text, ignored:true}]) 的用户可见可信度。"
