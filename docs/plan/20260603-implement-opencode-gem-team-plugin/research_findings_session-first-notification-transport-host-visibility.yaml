status: completed
tldr: |
  - 本仓库代码与测试已证明：插件会构造并调用 session prompt API，且会按 direct-shape 与 path/body-shape 双形态回退发送 noReply + ignored 文本。
  - 本仓库没有任何真实 OpenCode 宿主/TUI/UI 运行态观察，无法证明 ignored/noReply session prompt 一定会被用户看到。
  - 公开资料只能增强“消息会进入 session 或出现在某些 TUI 场景”的可能性，不能证明本仓库当前 ignored:true 变体在真实宿主中稳定可见。
  - 较强反证边界存在：公开 issue 已证明 noReply 语义在不同版本/调用上下文中曾失效、挂起或仍触发回复，说明宿主行为不应被当作稳定显示契约。
