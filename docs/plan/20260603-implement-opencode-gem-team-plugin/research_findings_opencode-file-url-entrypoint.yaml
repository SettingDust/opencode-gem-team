plan_id: 20260603-implement-opencode-gem-team-plugin
objective: "补足 bug-fix 诊断中关于 OpenCode 本地 file:///.../src/index.ts 插件入口可加载性的缺失证据"
focus_area: "OpenCode 对本地 file:///.../src/index.ts 插件入口的可加载性/约束/与 package entrypoint 的关系"
created_at: "2026-06-04T00:00:00+08:00"
created_by: gem-researcher
status: completed
tldr: |
  - OpenCode 将 `file://`、绝对路径、相对路径都归类为 path/file plugin，而不是 npm/package plugin。
  - 对 path/file plugin，若 spec 指向单个文件，则 loader 直接把该文件作为 import target，不走 package `main`/`exports`。
  - 若 spec 指向目录且目录含 `package.json`，OpenCode 会先读取 `exports["./server"]` 或 `main`；只有在目录无 package.json 时才回退到 `index.ts|js`。
  - 本仓库已验证的成功路径是“仓库根目录 path install + package entrypoints → dist/src/index.js”，不是 `src/index.ts` file URL 直载。
  - 对 `file:///E:/Projects/opencode-gem-team/src/index.ts`，OpenCode loader 本身大概率会尝试直接 import，但该入口未在本仓库 PoC 中验证，且运行时还依赖 TypeScript 直载能力与相对 `.js` 导入在源码态是否可解析，风险高于已验证的 dist/package 路径。
