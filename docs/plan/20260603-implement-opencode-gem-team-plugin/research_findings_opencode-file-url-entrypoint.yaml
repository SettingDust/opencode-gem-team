patterns_found:
  - category: architecture
    pattern: "path-like plugin specs are treated as file plugins"
    description: OpenCode 对 `file://`、绝对路径、相对路径统一归入 file source，而不是 npm source。
    examples:
      - file: shared.ts
        location: isPathPluginSpec
        snippet: "return spec.startsWith(\"file://\") || spec.startsWith(\".\") || isAbsolutePath(spec)"
    prevalence: common
  - category: structure
    pattern: "single-file path plugin bypasses package exports/main"
    description: 当 path spec 指向单文件时，loader 直接保留该文件作为 import target；不会再经 package `exports[\"./server\"]` 或 `main` 做 server entrypoint 解析。
    examples:
      - file: shared.ts
        location: resolvePathPluginTarget + resolvePluginEntrypoint
        snippet: "非目录 file spec 直接返回 spec/file URL；无 pkg 时 entry=target"
    prevalence: common
  - category: structure
    pattern: "directory path plugin with package.json prefers package server entry"
    description: 若 path spec 指向目录且目录含 package.json，OpenCode 会先读取 `exports[\"./server\"]`，其次 `main`，再决定 import target。
    examples:
      - file: shared.ts
        location: resolvePackageEntrypoint
        snippet: "exports['./server'] -> main"
      - file: installation-poc.md
        location: 14,27
        snippet: "本仓库 local package-path install 需 main + exports['./server']，并指向 dist/src/index.js"
    prevalence: common
  - category: naming
    pattern: "path plugin must export id"
    description: file/path plugin 无 package name 可回退，因此必须显式导出 plugin id。
    examples:
      - file: shared.ts
        location: resolvePluginId
        snippet: "if (source === 'file') { if (id) return id; throw new TypeError(...) }"
      - file: src/index.ts
        location: 23-26
        snippet: "export default { id: PLUGIN_ID, server } satisfies PluginModule"
    prevalence: common
  - category: architecture
    pattern: "local TS file support is documented, but package installs are a separate path"
    description: 官方文档明确本地插件目录可放 JS/TS 文件，配置中的 plugin 数组则文档化为 npm package names；两条链路不同。
    examples:
      - file: plugin docs
        location: From local files / From npm
        snippet: "Place JavaScript or TypeScript files in the plugin directory";
    prevalence: common
