name: Sync Gem Team agents

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-agents:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve latest upstream release tag
        id: upstream
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="$(gh api repos/mubaidr/gem-team/releases/latest --jq .tag_name)"
          if [ -z "$tag" ] || [ "$tag" = "null" ]; then
            echo "Latest published release tag not found" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved upstream release: $tag"

      - name: Sync agents
        run: npm run sync:agents -- --upstream-ref "${{ steps.upstream.outputs.tag }}"

      - name: Validate sync manifest
        run: npm run validate:sync

      - name: Validate no model IDs
        run: npm run validate:no-model-ids

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Validate dist
        run: npm run validate:dist

      - name: Commit and push changes
        env:
          TAG: ${{ steps.upstream.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No sync changes to commit"
            exit 0
          fi
          git commit -m "chore: sync agents from gem-team ${TAG}"
          git push origin HEAD:main
